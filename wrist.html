<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Forearm - Simplified Command</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@700;900&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --panel-bg: #080808;
            --text-main: #ffffff;
            --text-muted: #666666;
            --text-muted2: #999999;
            --accent-red: #ff2a00;
            --accent-red-dim: rgba(255, 42, 0, 0.08);
            --alert-orange: #ff8c00;
            --alert-yellow: #ffcc00;
            --ok-green: #00e676;
            --ff-blue: #2979ff;
            --border-color: #222222;
            --border-light: #3a3a3a;
        }

        body.light-mode {
            --bg-color: #F0EDE8;
            --panel-bg: #ffffff;
            --text-main: #151515;
            --text-muted: #7a756e;
            --text-muted2: #5a554e;
            --accent-red: #FF2200;
            --alert-orange: #cc9600;
            --alert-yellow: #b88000;
            --ok-green: #1a8a4a;
            --ff-blue: #1a5fe0;
            --border-color: #c5c1ba;
            --border-light: #a5a19a;
        }
        body.light-mode #forearm-container { border-color: var(--border-color); }
        body.light-mode .tactical-header { background: #e8e4df; }
        body.light-mode .col-controls-field { background: #f8f5f0; }
        body.light-mode .huge-action-btn { background: #ffffff; }
        body.light-mode .wrist-urgent-step { background: rgba(255,34,0,0.05); }
        body.light-mode .wrist-step-title { color: var(--text-main); }
        body.light-mode .wrist-step-done { background: #ffffff; }
        body.light-mode .tactical-footer { background: #e0ddd8; border-color: var(--border-color); }
        body.light-mode #btn-action-mic { background: #d8d4ce; border-color: var(--border-color); color: var(--text-main); }
        body.light-mode .svg-label-bg { fill: rgba(240,237,232,0.85) !important; }
        body.light-mode .screen-tab { color: var(--text-muted); }
        body.light-mode .screen-tab.active { color: var(--text-main); border-bottom-color: var(--accent-red); }
        body.light-mode .info-block { background: #ffffff; border-color: var(--border-color); }
        body.light-mode .info-item { background: #ffffff; border-color: var(--border-color); }

        #wrist-theme-btn {
            position: fixed;
            top: 12px; right: 16px;
            background: transparent;
            border: 1px solid #555;
            color: #aaa;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px; font-weight: 800;
            letter-spacing: 1px; text-transform: uppercase;
            padding: 5px 12px; border-radius: 4px;
            cursor: pointer; transition: border-color 0.15s, color 0.15s;
            z-index: 100;
        }
        body.light-mode #wrist-theme-btn { border-color: #999; color: #555; }
        #wrist-theme-btn:hover { border-color: var(--accent-red); color: var(--accent-red); }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Barlow Semi Condensed', sans-serif;
            font-weight: 700;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ===== LANDSCAPE CONTAINER ===== */
        #forearm-container {
            width: 840px;
            height: 420px;
            border: 5px solid #222;
            border-radius: 16px;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* ===== TOP STATUS BAR ===== */
        .tactical-header {
            height: 46px;
            background: #0a0a0a;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0;
            flex-shrink: 0;
            z-index: 40;
        }

        .header-time { padding-left: 16px; font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 800; width: 220px; display: flex; align-items: baseline; gap: 8px;}
        .header-time .lbl { font-size: 10px; color: var(--text-muted); letter-spacing: 2px; }
        .header-time span { color: var(--accent-red); }
        .header-incident { padding-right: 16px; font-size: 16px; color: var(--text-muted2); font-family: 'JetBrains Mono', monospace; font-weight: 900; letter-spacing: 2px; text-align: right; width: 220px;}

        .screen-tabs {
            display: flex;
            height: 100%;
        }
        .screen-tab {
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--text-muted2);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 2px;
            padding: 0 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .screen-tab.active {
            color: var(--text-main);
            border-bottom-color: var(--accent-red);
            background: rgba(255,42,0,0.05);
        }

        /* ===== SCREENS ===== */
        .screen {
            display: none;
            flex: 1;
            overflow: hidden;
        }
        .screen.active {
            display: flex;
        }

        /* --- SCREEN TACTICAL (MAP + ACTIONS) --- */
        #screen-tactical { flex-direction: row; }

        /* Left Column: MAP */
        .col-map-field {
            width: 420px;
            border-right: 2px solid var(--border-color);
            position: relative;
            background-color: #050505;
        }

        /* Right Column: CONTROLS */
        .col-controls-field {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            padding: 12px;
            gap: 12px;
        }

        /* --- SCREEN INFO (SIMPLE DISPATCH VIEW) --- */
        #screen-info {
            flex-direction: column;
            padding: 20px;
            background: var(--bg-color);
        }

        .info-top-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .info-block {
            flex: 1;
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .info-block.vehicle {
            border-color: var(--ff-blue);
            background: rgba(41, 121, 255, 0.05);
        }

        .info-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 900;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .info-value-huge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 46px;
            font-weight: 900;
            line-height: 1;
            color: var(--ff-blue);
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .info-eta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 900;
            color: var(--ok-green);
            background: rgba(0, 230, 118, 0.1);
            padding: 6px 16px;
            border-radius: 6px;
            border: 1px solid var(--ok-green);
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            flex: 1;
        }

        .info-item {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info-item .info-label { margin-bottom: 4px; font-size: 11px;}
        .info-item .info-value {
            font-size: 22px;
            font-weight: 900;
            color: var(--text-main);
            line-height: 1.2;
            text-transform: uppercase;
        }

        /* ===== MAP TACTICAL OVERLAY ===== */
        .map-visual-field { width: 100%; height: 100%; position: relative; }
        #wrist-leaflet-map { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; }
        .map-svg-content { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .map-svg-content #field-map-svg { pointer-events: all; }
        .leaflet-control-attribution { display: none !important; }
        .leaflet-control-zoom { display: none !important; }

        /* ===== RIGHT PANEL - MASSIVE ACTIONS ===== */
        .action-btn-group { display: flex; gap: 12px; height: 120px; flex-shrink: 0; }
        .huge-action-btn {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 12px; border: 2px solid var(--border-color); background: var(--panel-bg);
            color: var(--text-main); cursor: pointer; transition: all 0.15s; text-align: center;
        }
        
        .rally-btn { border-color: var(--alert-yellow); }
        .rally-btn:active { background: var(--alert-yellow); color: #000; transform: scale(0.98); }
        .rally-btn .btn-icon { color: var(--alert-yellow); }
        .rally-btn:active .btn-icon { color: #000; }

        .voice-btn { border-color: var(--ff-blue); }
        .voice-btn.active { background: rgba(41, 121, 255, 0.15); border-color: var(--ok-green); }
        .voice-btn.active .btn-icon { color: var(--ok-green); animation: pulse 1s infinite alternate; }
        .voice-btn.active .sub { color: var(--ok-green); }
        .voice-btn .btn-icon { color: var(--ff-blue); }

        .btn-icon { width: 32px; height: 32px; margin-bottom: 6px; display: block; }
        .btn-text { font-family: 'Barlow Semi Condensed', sans-serif; font-size: 18px; font-weight: 900; line-height: 1.1; letter-spacing: 0.5px; }
        .btn-text .sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 800; color: var(--text-muted); letter-spacing: 1px; display: block; margin-top: 4px; text-transform: uppercase; }

        /* ===== MEDICAL DIRECTIVE ===== */
        .wrist-urgent-step {
            flex: 1; background: var(--accent-red-dim); border: 2px solid var(--accent-red);
            border-radius: 12px; padding: 16px; display: flex; flex-direction: column;
            position: relative; overflow: hidden; box-shadow: inset 0 0 20px rgba(255, 42, 0, 0.05); transition: all 0.3s;
        }
        .wrist-urgent-step.completed { border-color: var(--ok-green); background: rgba(0, 230, 118, 0.05); box-shadow: none; }

        .wrist-step-header {
            font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 900; color: var(--accent-red);
            margin-bottom: 10px; display: flex; align-items: center; gap: 8px; letter-spacing: 2px; text-transform: uppercase;
        }
        .wrist-urgent-step.completed .wrist-step-header { color: var(--ok-green); }

        .pulse-dot {
            width: 8px; height: 8px; background: var(--accent-red); border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-red); animation: pulse 1s infinite alternate;
        }
        .wrist-urgent-step.completed .pulse-dot { background: var(--ok-green); box-shadow: 0 0 8px var(--ok-green); animation: none; }

        @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }

        .wrist-step-title { font-size: 34px; font-weight: 900; color: #ffffff; line-height: 1; margin-bottom: 6px; text-transform: uppercase; letter-spacing: -0.5px; }
        .wrist-step-sub { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 800; color: var(--alert-orange); letter-spacing: 1px; text-transform: uppercase; }
        .wrist-urgent-step.completed .wrist-step-sub { color: var(--text-muted); }

        .wrist-step-done {
            margin-top: auto; width: 100%; padding: 14px; background: #000; border: 1px solid var(--ok-green);
            color: var(--ok-green); font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 900;
            border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; transition: all 0.2s;
        }
        .wrist-step-done:hover { background: rgba(0, 230, 118, 0.1); box-shadow: 0 0 15px rgba(0, 230, 118, 0.2); }

        /* ===== MASSIVE FOOTER ===== */
        .tactical-footer {
            height: 56px; background: #000; border-top: 2px solid var(--border-color);
            display: flex; padding: 8px; gap: 10px; flex-shrink: 0; z-index: 40;
        }
        .footer-btn {
            height: 100%; border: none; border-radius: 6px; font-family: 'Barlow Semi Condensed', sans-serif;
            font-size: 15px; font-weight: 900; display: flex; align-items: center; justify-content: center;
            gap: 8px; text-transform: uppercase; color: #fff; letter-spacing: 0.5px;
        }
        #btn-action-mic { flex: 1; background: #111; border: 1px solid #333; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
        #btn-action-mic.recording { border-color: var(--ok-green); background: rgba(0, 230, 118, 0.08); color: var(--ok-green); }
        #btn-action-call { width: 220px; background: var(--accent-red); font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #000; font-weight: 900;}
        #btn-action-call.active { background: var(--ok-green); color: #000; box-shadow: 0 0 15px rgba(0,230,118,0.4); }
        .btn-icon-svg { width: 18px; height: 18px; fill: currentColor; }
    </style>
</head>
<body>

<button id="wrist-theme-btn" onclick="toggleWristTheme()">Light Mode</button>

<div id="forearm-container">
    
    <!-- HEADER BAR -->
    <div class="tactical-header">
        <div class="header-time"><span class="lbl">ELAPSED</span><span id="f-chrono">00:00:00</span></div>
        <div class="screen-tabs">
            <button class="screen-tab active" onclick="switchWristScreen('tactical', this)">TACTICAL</button>
            <button class="screen-tab" onclick="switchWristScreen('info', this)">DISPATCH INFO</button>
        </div>
        <div class="header-incident">ITV-2026-892</div>
    </div>

    <!-- MAIN WORKSPACE -->
    
    <!-- SCREEN 1: TACTICAL & MAP -->
    <div id="screen-tactical" class="screen active">
        
        <!-- LEFT: MAP -->
        <div class="col-map-field">
            <div class="map-visual-field">
                <div id="wrist-leaflet-map"></div>
                <svg class="map-svg-content" id="field-map-svg" viewBox="0 0 420 310" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="grad-collapse" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#ff9900" stop-opacity="0.38"/>
                            <stop offset="100%" stop-color="#ff9900" stop-opacity="0"/>
                        </radialGradient>
                        <radialGradient id="grad-flood" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#0088ff" stop-opacity="0.35"/>
                            <stop offset="100%" stop-color="#0088ff" stop-opacity="0"/>
                        </radialGradient>
                    </defs>

                    <ellipse cx="110" cy="120" rx="65" ry="45" fill="url(#grad-collapse)" />
                    <ellipse cx="340" cy="220" rx="75" ry="45" fill="url(#grad-flood)" />
                    
                    <g fill="none" stroke="rgba(128,128,128,0.15)" stroke-width="1.5">
                        <path d="M 20,200 C 50,160 90,140 140,150 C 190,160 210,190 200,230 Z"/>
                        <path d="M 260,60 C 300,40 360,60 390,100 C 420,140 400,190 360,200 Z"/>
                    </g>

                    <path d="M 200,310 L 200,200 L 100,130 L 300,140" fill="none" stroke="var(--text-muted)" stroke-width="3" stroke-dasharray="6 4" />
                    <line id="f-path-d1" stroke="var(--accent-red)" stroke-width="1.5" stroke-dasharray="4 4" style="display:none;" />
                    <line id="f-path-d2" stroke="var(--accent-red)" stroke-width="1.5" stroke-dasharray="4 4" style="display:none;" />
                    <line id="f-path-d3" stroke="var(--accent-red)" stroke-width="1.5" stroke-dasharray="4 4" style="display:none;" />
                    <line id="f-path-d4" stroke="var(--accent-red)" stroke-width="1.5" stroke-dasharray="4 4" style="display:none;" />

                    <!-- DRONES -->
                    <g class="drone-group" id="f-drone-1"><circle cx="0" cy="0" r="20" fill="transparent"/><g id="d1-spin"><circle cx="0" cy="0" r="11" fill="none" stroke="#FF2200" stroke-width="3" stroke-dasharray="12 4"/><line x1="-16" y1="0" x2="-12" y2="0" stroke="#FF2200" stroke-width="2.5" stroke-linecap="round"/><line x1="12" y1="0" x2="16" y2="0" stroke="#FF2200" stroke-width="2.5" stroke-linecap="round"/><line x1="0" y1="-16" x2="0" y2="-12" stroke="#FF2200" stroke-width="2.5" stroke-linecap="round"/><line x1="0" y1="12" x2="0" y2="16" stroke="#FF2200" stroke-width="2.5" stroke-linecap="round"/></g><circle cx="0" cy="0" r="4" fill="none" stroke="#FF2200" stroke-width="2"/><circle cx="0" cy="0" r="2" fill="#FF2200"/><text x="14" y="4" fill="white" font-size="11" font-weight="800" font-family="'JetBrains Mono', monospace">D1</text></g>
                    <g class="drone-group" id="f-drone-2"><circle cx="0" cy="0" r="20" fill="transparent"/><g id="d2-spin"><circle cx="0" cy="0" r="11" fill="none" stroke="#FF2200" stroke-width="3" stroke-dasharray="12 4"/><line x1="-16" y1="0" x2="-12" y2="0" stroke="#FF2200" stroke-width="2.5" stroke-linecap="round"/><line x1="12" y1="0" x2="16" y2="0" stroke="#FF2200" stroke-width="2.5" stroke-linecap="round"/><line x1="0" y1="-16" x2="0" y2="-12" stroke="#FF2200" stroke-width="2.5" stroke-linecap="round"/><line x1="0" y1="12" x2="0" y2="16" stroke="#FF2200" stroke-width="2.5" stroke-linecap="round"/></g><circle cx="0" cy="0" r="4" fill="none" stroke="#FF2200" stroke-width="2"/><circle cx="0" cy="0" r="2" fill="#FF2200"/><text x="14" y="4" fill="white" font-size="11" font-weight="800" font-family="'JetBrains Mono', monospace">D2</text></g>
                    <g class="drone-group" id="f-drone-3"><circle cx="0" cy="0" r="20" fill="transparent"/><g id="d3-spin"><circle cx="0" cy="0" r="11" fill="none" stroke="#FF2200" stroke-width="3" stroke-dasharray="12 4"/><line x1="-16" y1="0" x2="-12" y2="0" stroke="#FF2200" stroke-width="2.5" stroke-linecap="round"/><line x1="12" y1="0" x2="16" y2="0" stroke="#FF2200" stroke-width="2.5" stroke-linecap="round"/><line x1="0" y1="-16" x2="0" y2="-12" stroke="#FF2200" stroke-width="2.5" stroke-linecap="round"/><line x1="0" y1="12" x2="0" y2="16" stroke="#FF2200" stroke-width="2.5" stroke-linecap="round"/></g><circle cx="0" cy="0" r="4" fill="none" stroke="#FF2200" stroke-width="2"/><circle cx="0" cy="0" r="2" fill="#FF2200"/><text x="14" y="4" fill="white" font-size="11" font-weight="800" font-family="'JetBrains Mono', monospace">D3</text></g>
                    <g class="drone-group" id="f-drone-4"><circle cx="0" cy="0" r="20" fill="transparent"/><g id="d4-spin"><circle cx="0" cy="0" r="11" fill="none" stroke="#FF2200" stroke-width="3" stroke-dasharray="12 4"/><line x1="-16" y1="0" x2="-12" y2="0" stroke="#FF2200" stroke-width="2.5" stroke-linecap="round"/><line x1="12" y1="0" x2="16" y2="0" stroke="#FF2200" stroke-width="2.5" stroke-linecap="round"/><line x1="0" y1="-16" x2="0" y2="-12" stroke="#FF2200" stroke-width="2.5" stroke-linecap="round"/><line x1="0" y1="12" x2="0" y2="16" stroke="#FF2200" stroke-width="2.5" stroke-linecap="round"/></g><circle cx="0" cy="0" r="4" fill="none" stroke="#FF2200" stroke-width="2"/><circle cx="0" cy="0" r="2" fill="#FF2200"/><text x="14" y="4" fill="white" font-size="11" font-weight="800" font-family="'JetBrains Mono', monospace">D4</text></g>

                    <!-- TEAM & VICTIM -->
                    <g id="f-ff-karim" transform="translate(240,170)">
                        <circle cx="-8" cy="-2" r="5" fill="var(--ff-blue)"/>
                        <rect x="2" y="-10" width="46" height="16" rx="2" fill="rgba(8,8,20,0.85)" stroke="var(--ff-blue)" stroke-width="1" class="svg-label-bg"/>
                        <text x="4" y="2" fill="#ffffff" font-size="11" font-weight="900" font-family="'JetBrains Mono'">KARIM</text>
                    </g>
                    <g id="f-ff-luca" transform="translate(170,250)">
                        <circle cx="-8" cy="-2" r="5" fill="var(--ff-blue)"/>
                        <rect x="2" y="-10" width="40" height="16" rx="2" fill="rgba(8,8,20,0.85)" stroke="var(--ff-blue)" stroke-width="1" class="svg-label-bg"/>
                        <text x="4" y="2" fill="#ffffff" font-size="11" font-weight="900" font-family="'JetBrains Mono'">LUCA</text>
                    </g>

                    <g id="f-victim-marker" transform="translate(300,140)">
                        <circle cx="0" cy="0" r="25" fill="transparent"/>
                        <circle cx="0" cy="0" r="14" fill="none" stroke="var(--alert-yellow)" stroke-width="2">
                            <animate attributeName="r" values="4;20;4" dur="1.5s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite"/>
                        </circle>
                        <path d="M -8,0 L 8,0 M 0,-8 L 0,8" stroke="var(--alert-yellow)" stroke-width="2"/>
                        <rect x="16" y="-8" width="50" height="16" rx="2" fill="rgba(0,0,0,0.6)" class="svg-label-bg"/>
                        <text x="18" y="4" fill="var(--alert-yellow)" font-size="12" font-weight="900" font-family="'JetBrains Mono'">VICTIM</text>
                    </g>
                </svg>
            </div>
        </div>

        <!-- RIGHT: SIMPLIFIED COMMANDS -->
        <div class="col-controls-field">
            
            <div class="action-btn-group">
                <button class="huge-action-btn rally-btn" onclick="rallyDronesOnMe()">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <circle cx="12" cy="12" r="6"></circle>
                        <circle cx="12" cy="12" r="2"></circle>
                    </svg>
                    <div class="btn-text">RALLY DRONES<br><span class="sub">ON MY POSITION</span></div>
                </button>
                
                <button class="huge-action-btn voice-btn" onclick="toggleDroneVoice(this)">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" x2="12" y1="19" y2="22"></line>
                        <line x1="8" x2="16" y1="22" y2="22"></line>
                    </svg>
                    <div class="btn-text">VOICE CMD<br><span class="sub">PUSH TO TALK</span></div>
                </button>
            </div>

            <div class="wrist-urgent-step">
                <div class="wrist-step-header">
                    <span class="pulse-dot"></span> CURRENT DIRECTIVE
                </div>
                
                <div class="wrist-step-title">ASPIRIN 250MG IV</div>
                <div class="wrist-step-sub">RULE OUT ALLERGIES / ULCER</div>
                
                <button class="wrist-step-done" onclick="completeMedicalStep(this)">MARK COMPLETED</button>
            </div>

        </div>
    </div>

    <!-- SCREEN 2: INFO & DISPATCH -->
    <div id="screen-info" class="screen">
        <div class="info-top-row">
            <div class="info-block vehicle">
                <div class="info-label">ASSIGNED CARE VEHICLE</div>
                <div class="info-value-huge">H-01</div>
            </div>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">PATIENT</div>
                <div class="info-value">MARTIN THOMAS<br><span style="font-size:14px; color:var(--text-muted2);">68 Y/O MALE</span></div>
            </div>
            <div class="info-item">
                <div class="info-label">LOCATION</div>
                <div class="info-value">SECTOR 4<br><span style="font-size:14px; color:var(--text-muted2);">MORGIOU TRAIL</span></div>
            </div>
        </div>
    </div>

    <!-- FOOTER CONTROLS -->
    <div class="tactical-footer">
        <button class="footer-btn" id="btn-action-mic" onclick="toggleFieldMic(this)">
            <svg class="btn-icon-svg" viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.42 2.72 6.2 6 6.7V21h2v-3.3c3.28-.5 6-3.28 6-6.7h-1.7z"/>
            </svg>
            <span id="field-mic-text">VOICE REPORT DICTATION</span>
        </button>

        <button class="footer-btn" id="btn-action-call" onclick="toggleFieldCall(this)">
            <svg class="btn-icon-svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.77a19.79 19.79 0 01-3.07-8.67A2 2 0 012 1h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
            </svg>
            <span id="field-call-text">HOSPITAL LINK</span>
        </button>
    </div>

</div>

<script>
    // --- CHRONO / ELAPSED TIME ---
    // Start time fixed to 14 minutes and 22 seconds ago for demonstration
    const dispatchTime = new Date();
    dispatchTime.setMinutes(dispatchTime.getMinutes() - 14);
    dispatchTime.setSeconds(dispatchTime.getSeconds() - 22);

    function updateChrono() {
        const now = new Date();
        const diff = Math.max(0, Math.floor((now - dispatchTime) / 1000));
        const h = String(Math.floor(diff / 3600)).padStart(2, '0');
        const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
        const s = String(diff % 60).padStart(2, '0');
        document.getElementById('f-chrono').textContent = `${h}:${m}:${s}`;
    }
    setInterval(updateChrono, 1000); updateChrono();

    // --- SCREEN SWITCHER ---
    function switchWristScreen(screenId, btn) {
        document.querySelectorAll('.screen-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + screenId).classList.add('active');

        // Required for Leaflet to render correctly after display: none
        if(screenId === 'tactical' && wristMap) {
            setTimeout(() => { wristMap.invalidateSize(); }, 50);
        }
    }

    // --- NEW SIMPLIFIED COMMANDS ---
    const MY_POS_X = 240, MY_POS_Y = 170; // Position of KARIM (the wearer)
    const OFFSETS = [{dx:-15,dy:-15},{dx:15,dy:-15},{dx:15,dy:15},{dx:-15,dy:15}];

    function rallyDronesOnMe() {
        drones.forEach((d, i) => {
            d.tx = MY_POS_X + OFFSETS[i].dx; 
            d.ty = MY_POS_Y + OFFSETS[i].dy;
            d.path.setAttribute('x1', d.x); d.path.setAttribute('y1', d.y);
            d.path.setAttribute('x2', d.tx); d.path.setAttribute('y2', d.ty);
            d.path.style.display = 'block';
        });
    }

    function toggleDroneVoice(btn) {
        btn.classList.toggle('active');
        const sub = btn.querySelector('.sub');
        if (btn.classList.contains('active')) {
            sub.textContent = "TRANSMITTING...";
        } else {
            sub.textContent = "PUSH TO TALK";
        }
    }

    function completeMedicalStep(btn) {
        const container = btn.closest('.wrist-urgent-step');
        container.classList.add('completed');
        btn.textContent = "COMPLETED ✓";
        btn.style.background = "var(--ok-green)";
        btn.style.color = "#000";
    }

    // --- DRONE LOOPS & RETICLE SPIN ANIMATION ENGINE ---
    let globalTime = 0;
    let spinAngle = [0, 0, 0, 0];
    const spinSpeeds = [1.4, -1.1, 1.6, -1.3]; 
    const spinEls = [
        document.getElementById('d1-spin'),
        document.getElementById('d2-spin'),
        document.getElementById('d3-spin'),
        document.getElementById('d4-spin'),
    ];

    const drones = [
        {id:1, x:90,  y:70,  tx:90,  ty:70,  el:document.getElementById('f-drone-1'), path:document.getElementById('f-path-d1')},
        {id:2, x:260, y:60,  tx:260, ty:60,  el:document.getElementById('f-drone-2'), path:document.getElementById('f-path-d2')},
        {id:3, x:350, y:220, tx:350, ty:220, el:document.getElementById('f-drone-3'), path:document.getElementById('f-path-d3')},
        {id:4, x:70,  y:220, tx:70,  ty:220, el:document.getElementById('f-drone-4'), path:document.getElementById('f-path-d4')}
    ];

    function animationEngine() {
        globalTime += 0.05;
        
        // Reticle rotations
        for (let i = 0; i < 4; i++) {
            if (spinEls[i]) {
                spinAngle[i] += spinSpeeds[i];
                spinEls[i].setAttribute('transform', `rotate(${spinAngle[i]})`);
            }
        }

        // Drone movements
        drones.forEach(d => {
            const dx = d.tx - d.x, dy = d.ty - d.y, dist = Math.hypot(dx, dy);
            if(dist > 1) {
                d.x += (dx / dist) * 2; d.y += (dy / dist) * 2;
                d.path.setAttribute('x1', d.x); d.path.setAttribute('y1', d.y);
                d.el.setAttribute('transform', `translate(${d.x}, ${d.y})`);
            } else {
                d.x = d.tx; d.y = d.ty; d.path.style.display = 'none';
                d.el.setAttribute('transform', `translate(${d.x}, ${d.y + Math.sin(globalTime + d.id)*1.2})`);
            }
        });
        requestAnimationFrame(animationEngine);
    }
    requestAnimationFrame(animationEngine);

    // --- LEAFLET MAP ---
    const wristMap = L.map('wrist-leaflet-map', { zoomControl: false, dragging: false, scrollWheelZoom: false, doubleClickZoom: false, touchZoom: false, keyboard: false, attributionControl: false })
        .setView([43.2140, 5.4330], 15);
    const WRIST_TILE_DARK  = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
    const WRIST_TILE_LIGHT = 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
    let wristTileLayer = L.tileLayer(WRIST_TILE_DARK, { subdomains: 'abcd', maxZoom: 19 }).addTo(wristMap);

    function toggleWristTheme() {
        const btn = document.getElementById('wrist-theme-btn');
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        btn.textContent = isLight ? 'Dark Mode' : 'Light Mode';
        wristTileLayer.remove();
        wristTileLayer = L.tileLayer(isLight ? WRIST_TILE_LIGHT : WRIST_TILE_DARK, { subdomains: 'abcd', maxZoom: 19 }).addTo(wristMap);
    }

    // --- FOOTER SCRIPTS ---
    function toggleFieldMic(btn) {
        btn.classList.toggle('recording');
        document.getElementById('field-mic-text').textContent = btn.classList.contains('recording') ? "STREAMING REPORT..." : "VOICE REPORT DICTATION";
    }
    
    let isCalling = false;
    function toggleFieldCall(btn) {
        isCalling = !isCalling;
        const textSpan = document.getElementById('field-call-text');
        if (isCalling) {
            btn.classList.add('active');
            textSpan.textContent = 'CONNECTED';
        } else {
            btn.classList.remove('active');
            textSpan.textContent = 'HOSPITAL LINK';
        }
    }
</script>
</body>
</html>
